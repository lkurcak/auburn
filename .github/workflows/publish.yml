name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to publish"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - auburn2d
          - auburn3d
      dry_run:
        description: "Dry run (no upload)"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        if: ${{ !inputs.dry_run }}
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish selected crate(s)
        env:
          CARGO_REGISTRY_TOKEN: ${{ !inputs.dry_run && steps.auth.outputs.token || '' }}
        run: |
          if [ "${{ inputs.crate }}" = "all" ]; then
            cargo publish -p auburn2d ${{ inputs.dry_run && '--dry-run' || '' }}
            cargo publish -p auburn3d ${{ inputs.dry_run && '--dry-run' || '' }}
          else
            cargo publish -p ${{ inputs.crate }} ${{ inputs.dry_run && '--dry-run' || '' }}
          fi
