name: Publish to crates.io

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and workspace version
        run: |
          echo "${{ github.ref_name }}" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$'
          WORKSPACE_VERSION=$(grep -E '^\s*version\s*=' Cargo.toml | head -1 | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          echo "Workspace version: $WORKSPACE_VERSION"
          test "${{ github.ref_name }}" = "$WORKSPACE_VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p auburn2d
          cargo publish -p auburn3d
